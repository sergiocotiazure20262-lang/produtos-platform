name: Backend CI - Treinamento TJ/PR COTI Informatica

# ==================================
# ON
# Eventos que executam a pipelines
# ==================================

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

# ==================================
# JOBS
# Tarefas executadas pela pipeline
# ==================================
jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar o PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Instalar as dependências (Composer)
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env
        run: cp .env.example .env

      - name: Gerar chave da aplicação
        run: php artisan key:generate

      - name: Build concluido
        run: echo "Build finalizado com sucesso!"

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Iniciando testes
        run: echo "Iniciando o processo de testes!"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Iniciando implantação
        run: echo "Iniciando a implantação do projeto!"