name: Backend CI - Treinamento TJ/PR COTI Informatica

# ==================================
# ON
# Eventos que executam a pipelines
# ==================================

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

# ==================================
# JOBS
# Tarefas executadas pela pipeline
# ==================================
jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar o PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Instalar as dependências (Composer)
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env
        run: cp .env.example .env

      - name: Gerar chave da aplicação
        run: php artisan key:generate

      - name: Build concluido
        run: echo "Build finalizado com sucesso!"

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: produtos_test
        ports:
          - 3306:3306
        options:
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Configurar o PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql

      - name: Instalar as dependências (Composer)
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env.testing
        run: cp .env.example .env.testing

      - name: Configurar as variáveis de ambiente para testes
        run:
          echo "APP_ENV=testing" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=produtos_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=root" >> .env.testing
          echo "CACHE_DRIVER=array" >> .env.testing

      - name: Gerar chave da aplicação
        run: php artisan key:generate --env=testing

      - name: Aguardar o MySQL ficar pronto
        run: sleep 20

      - name: Executar migrations no banco de teste
        run: php artisan migrate --env=testing

      - name: Executar testes
        run: php artisan test --env=testing

  deploy:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Iniciando implantação
        run: echo "Iniciando a implantação do projeto!"